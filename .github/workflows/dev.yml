name: Development Builds (Mobile)

on:
  workflow_dispatch:

jobs:
  build-android-dev:
    name: Build Android (development client)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Init only needed submodules
        run: |
          git submodule update --init ./apps/mobile
          git submodule update --init ./packages/types
          git submodule update --init ./packages/logger
          git submodule update --init ./packages/ui-core
          git submodule update --init ./packages/ui-native
          git submodule update --init ./packages/validators
          git submodule update --init ./packages/bitfield
          git submodule update --init ./tooling/eslint-config

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-mobile-dev-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-mobile-dev-

      - name: Install dependencies
        run: pnpm i

      - name: Build workspace packages
        run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/ui-core" --filter="./packages/ui-native" --filter="./packages/validators" --filter="./packages/bitfield"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild Android project
        working-directory: apps/mobile
        env:
          CI: "1"
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Build Android debug (development client)
        working-directory: apps/mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Collect Android artifact
        shell: bash
        run: |
          mkdir -p release
          APK=$(ls apps/mobile/android/app/build/outputs/apk/debug/*.apk 2>/dev/null | head -n1)
          [[ -f "$APK" ]] && cp "$APK" ./release/Mutualzz-dev.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-android
          path: release/
          if-no-files-found: warn
          retention-days: 7

  build-ios-dev:
    name: Build iOS (development client)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup iOS development signing
        shell: bash
        env:
          IOS_DEVELOPMENT_CERTIFICATE_BASE64: ${{ secrets.IOS_DEVELOPMENT_CERTIFICATE_BASE64 }}
          IOS_DEVELOPMENT_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          IOS_DEV_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_DEV_PROVISIONING_PROFILE_BASE64 }}
          IOS_DEV_NOTIFICATION_SERVICE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_DEV_NOTIFICATION_SERVICE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          install_provisioning_profile() {
            local profile_b64="$1"
            local profile_file="$2"
            local profile_plist="$3"

            printf "%s" "$profile_b64" \
              | tr -d '\n\r' \
              | base64 --decode > "$profile_file"

            security cms -D -i "$profile_file" > "$profile_plist"

            local profile_uuid profile_name
            profile_uuid=$(plutil -extract UUID xml1 -o - "$profile_plist" \
              | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
            profile_name=$(plutil -extract Name xml1 -o - "$profile_plist" \
              | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')

            cp "$profile_file" \
              ~/Library/MobileDevice/"Provisioning Profiles"/"$profile_uuid.mobileprovision"

            echo "$profile_name"
          }

          echo "Decoding certificate (corruption-safe)..."
          printf "%s" "$IOS_DEVELOPMENT_CERTIFICATE_BASE64" \
            | tr -d '\n\r' \
            | base64 --decode > /tmp/ios_development.p12

          echo "Validating certificate file..."
          ls -lh /tmp/ios_development.p12
          file /tmp/ios_development.p12

          echo "Creating keychain..."
          security create-keychain -p "build-keychain-password" ios-dev-build.keychain
          security default-keychain -s ios-dev-build.keychain
          security unlock-keychain -p "build-keychain-password" ios-dev-build.keychain
          security set-keychain-settings -t 21600 ios-dev-build.keychain

          echo "Importing certificate..."
          security import /tmp/ios_development.p12 \
            -k ios-dev-build.keychain \
            -P "$IOS_DEVELOPMENT_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "build-keychain-password" \
            ios-dev-build.keychain

          security list-keychains -d user -s ios-dev-build.keychain $(security list-keychains -d user | tr -d '"')

          echo "Installing provisioning profiles..."
          mkdir -p ~/Library/MobileDevice/"Provisioning Profiles"

          echo "Installing main app provisioning profile..."
          PROFILE_NAME=$(install_provisioning_profile \
            "$IOS_DEV_PROVISIONING_PROFILE_BASE64" \
            /tmp/profile.mobileprovision \
            /tmp/profile.plist)

          echo "Installing notification service extension provisioning profile..."
          EXTENSION_PROFILE_NAME=$(install_provisioning_profile \
            "$IOS_DEV_NOTIFICATION_SERVICE_PROVISIONING_PROFILE_BASE64" \
            /tmp/extension_profile.mobileprovision \
            /tmp/extension_profile.plist)

          CODE_SIGN_IDENTITY=$(security find-identity -v -p codesigning ios-dev-build.keychain \
            | grep -m1 "Apple Development" \
            | sed -E 's/.*"(.*)"/\1/')

          CODE_SIGN_SHA1=$(security find-identity -v -p codesigning ios-dev-build.keychain \
            | grep -m1 "Apple Development" \
            | awk '{print $2}')

          EXTENSION_BUNDLE_ID=$(plutil -extract Entitlements.application-identifier raw -o - /tmp/extension_profile.plist \
            | sed 's/^[^.]*\.//')
          EXPECTED_EXTENSION_BUNDLE_ID="com.mutualzz.app.notification-service"
          if [[ "$EXTENSION_BUNDLE_ID" != "$EXPECTED_EXTENSION_BUNDLE_ID" ]]; then
            echo "::error::Extension provisioning profile App ID '$EXTENSION_BUNDLE_ID' does not match expected '$EXPECTED_EXTENSION_BUNDLE_ID'. Create a development profile for the extension App ID and update IOS_DEV_NOTIFICATION_SERVICE_PROVISIONING_PROFILE_BASE64."
            exit 1
          fi

          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "EXTENSION_PROFILE_NAME=$EXTENSION_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "EXTENSION_BUNDLE_ID=$EXTENSION_BUNDLE_ID" >> "$GITHUB_ENV"
          echo "CODE_SIGN_IDENTITY=$CODE_SIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "CODE_SIGN_SHA1=$CODE_SIGN_SHA1" >> "$GITHUB_ENV"

      - name: Verify certificate is included in provisioning profiles
        shell: bash
        run: |
          set -euo pipefail

          verify_certificate_in_profile() {
            local profile_plist="$1"
            local profile_name="$2"

            echo "Checking that '$CODE_SIGN_IDENTITY' is included in profile '$profile_name'..."
            local match="no"
            local i=0
            while :; do
              CERT_XML=$(plutil -extract "DeveloperCertificates.$i" xml1 -o - "$profile_plist" 2>/dev/null) || break
              [[ -z "$CERT_XML" ]] && break

              CERT_B64=$(echo "$CERT_XML" | sed -n '/<data>/,/<\/data>/p' | sed '1d;$d' | tr -d '\n\r\t ')
              echo "$CERT_B64" | base64 --decode > "/tmp/profile_cert_${profile_name// /_}_$i.der"

              FPR=$(openssl x509 -inform DER -in "/tmp/profile_cert_${profile_name// /_}_$i.der" -noout -fingerprint -sha1 \
                | sed 's/.*=//; s/://g')

              if [[ "$FPR" == "$CODE_SIGN_SHA1" ]]; then
                match="yes"
                break
              fi

              i=$((i + 1))
            done

            if [[ "$match" != "yes" ]]; then
              echo "::error::Certificate '$CODE_SIGN_IDENTITY' ($CODE_SIGN_SHA1) is not included in provisioning profile '$profile_name'. Regenerate the profile in the Apple Developer portal against this certificate and update the corresponding GitHub secret."
              exit 1
            fi

            echo "Certificate matches a certificate in provisioning profile '$profile_name'."
          }

          verify_certificate_in_profile /tmp/profile.plist "$PROFILE_NAME"
          verify_certificate_in_profile /tmp/extension_profile.plist "$EXTENSION_PROFILE_NAME"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Init only needed submodules
        run: |
          git submodule update --init ./apps/mobile
          git submodule update --init ./packages/types
          git submodule update --init ./packages/logger
          git submodule update --init ./packages/ui-core
          git submodule update --init ./packages/ui-native
          git submodule update --init ./packages/validators
          git submodule update --init ./packages/bitfield
          git submodule update --init ./tooling/eslint-config

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-mobile-dev-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-mobile-dev-

      - name: Install dependencies
        run: pnpm i

      - name: Build workspace packages
        run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/ui-core" --filter="./packages/ui-native" --filter="./packages/validators" --filter="./packages/bitfield"

      - name: Prebuild iOS project
        working-directory: apps/mobile
        env:
          CI: "1"
        run: |
          set -euo pipefail

          if [[ ! -f targets/notification-service/expo-target.config.js ]]; then
            echo "::error::Missing targets/notification-service/expo-target.config.js. The notification service extension must be present in apps/mobile before prebuild."
            exit 1
          fi

          pnpm exec expo prebuild --platform ios --no-install

      - name: Verify capabilities match provisioning profile
        shell: bash
        run: |
          set -euo pipefail

          ENTITLEMENTS_FILE=$(find apps/mobile/ios -maxdepth 2 -name "*.entitlements" | head -n1)
          if [[ -z "$ENTITLEMENTS_FILE" ]]; then
            echo "No entitlements file found, skipping capability check."
            exit 0
          fi

          echo "Checking capabilities requested in $ENTITLEMENTS_FILE against '$PROFILE_NAME'..."
          PROFILE_ENTITLEMENTS=$(plutil -extract Entitlements json -o - /tmp/profile.plist)
          echo "Provisioning profile entitlements: $PROFILE_ENTITLEMENTS"

          APP_KEYS=$(plutil -convert xml1 -o - "$ENTITLEMENTS_FILE" | grep -oE '<key>[^<]+</key>' | sed -E 's/<\/?key>//g')

          MISSING=""
          while IFS= read -r key; do
            [[ -z "$key" ]] && continue
            case "$key" in
              application-identifier | com.apple.developer.team-identifier | keychain-access-groups | get-task-allow | aps-environment)
                # aps-environment is added by Xcode during archive for App Store profiles.
                continue
                ;;
            esac
            if ! jq -e --arg k "$key" 'has($k)' <<<"$PROFILE_ENTITLEMENTS" >/dev/null; then
              MISSING="$MISSING $key"
            fi
          done <<<"$APP_KEYS"

          if [[ -n "$MISSING" ]]; then
            echo "::error::Provisioning profile '$PROFILE_NAME' is missing entitlement(s):$MISSING. Enable the matching capability on the com.mutualzz.app identifier in the Apple Developer portal, regenerate the profile, and update the IOS_DEV_PROVISIONING_PROFILE_BASE64 secret."
            exit 1
          fi
          echo "All requested capabilities are present in the provisioning profile."

      - name: Allow arbitrary HTTP (development only)
        shell: bash
        run: |
          INFO_PLIST=$(find apps/mobile/ios -name Info.plist | head -n1)

          echo "Patching $INFO_PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$INFO_PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" "$INFO_PLIST"

          echo "ATS configuration:"
          /usr/libexec/PlistBuddy -c "Print :NSAppTransportSecurity" "$INFO_PLIST"

      - name: Install CocoaPods dependencies
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Resolve notification service extension target
        shell: bash
        run: |
          set -euo pipefail

          XCODEPROJ=$(find apps/mobile/ios -name "*.xcodeproj" | head -n1)
          if [[ -z "$XCODEPROJ" ]]; then
            echo "::error::No .xcodeproj found after iOS prebuild."
            exit 1
          fi

          EXTENSION_TARGET=$(bash .github/scripts/resolve-ios-extension-target.sh \
            "$XCODEPROJ" \
            "$EXTENSION_BUNDLE_ID")

          echo "Resolved notification service extension target: $EXTENSION_TARGET"
          echo "EXTENSION_TARGET=$EXTENSION_TARGET" >> "$GITHUB_ENV"

      - name: Apply manual signing to generated Xcode project
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          PBXPROJ=$(find apps/mobile/ios -name project.pbxproj | head -n1)
          if [[ -z "$PBXPROJ" ]]; then
            echo "::error::No project.pbxproj found after iOS prebuild."
            exit 1
          fi
          WORKSPACE=$(ls -d apps/mobile/ios/*.xcworkspace | head -n1)
          MAIN_TARGET=$(basename "$WORKSPACE" .xcworkspace)
          XCODEPROJ=$(find apps/mobile/ios -name "*.xcodeproj" | head -n1)
          if [[ -z "$XCODEPROJ" ]]; then
            echo "::error::No .xcodeproj found after iOS prebuild."
            exit 1
          fi
          ruby .github/scripts/patch-ios-signing.rb \
            "$XCODEPROJ" \
            "$APPLE_TEAM_ID" \
            "$PROFILE_NAME" \
            "$EXTENSION_PROFILE_NAME" \
            "$CODE_SIGN_IDENTITY" \
            "$MAIN_TARGET" \
            "$EXTENSION_TARGET"

      - name: Archive and export IPA
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          WORKSPACE=$(ls -d apps/mobile/ios/*.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          ARCHIVE_PATH="$RUNNER_TEMP/Mutualzz.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

          cat <<PLIST > "$RUNNER_TEMP/ExportOptions.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.mutualzz.app</key>
                  <string>$PROFILE_NAME</string>
                  <key>$EXTENSION_BUNDLE_ID</key>
                  <string>$EXTENSION_PROFILE_NAME</string>
              </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Collect iOS artifact
        shell: bash
        run: |
          mkdir -p release
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa 2>/dev/null | head -n1)
          [[ -f "$IPA" ]] && cp "$IPA" ./release/Mutualzz-dev.ipa

      - name: Cleanup iOS keychain
        if: always()
        run: security delete-keychain ios-dev-build.keychain || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-ios
          path: release/
          if-no-files-found: warn
          retention-days: 7
