name: Release (Electron + Netlify)

on:
    workflow_dispatch:
    push:
        branches:
            - release

jobs:
    deploy-web:
        name: Deploy Web version to Netlify
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4
                with:
                    submodules: false

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version: '24'

            -   name: Enable Corepack
                run: corepack enable

            -   name: Activate pnpm
                run: corepack prepare pnpm@latest --activate

            -   name: Verify toolchain
                shell: bash
                run: |
                    node --version
                    corepack --version
                    pnpm --version

            -   name: Init only needed submodules
                run: |
                    git submodule update --init ./apps/app
                    git submodule update --init ./packages/types
                    git submodule update --init ./packages/logger
                    git submodule update --init ./packages/color-picker
                    git submodule update --init ./packages/contexify
                    git submodule update --init ./packages/ui-core
                    git submodule update --init ./packages/ui-web
                    git submodule update --init ./packages/validators
                    git submodule update --init ./packages/bitfield
                    git submodule update --init ./tooling/eslint-config

            -   name: Install dependencies
                run: pnpm i --ignore-scripts

            -   name: Build peer dependencies
                run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/color-picker" --filter="./packages/contexify" --filter="./packages/ui-core"

            -   name: Build dependencies
                run: pnpm turbo run build --filter="./packages/ui-web" --filter="./packages/validators" --filter="./packages/bitfield"

            -   name: Deploy to Netlify
                env:
                    NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
                run: pnpx netlify deploy --cwd apps/app --prod --site=94e51d96-ca0f-4128-bda5-7f22eb07fcc5 --message "${{ github.event.head_commit.message }}"

    build-binaries:
        name: Build Binaries (${{ matrix.platform }})
        needs: deploy-web
        permissions:
            contents: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    -   platform: macos-latest
                        artifact_name: macos
                    -   platform: ubuntu-22.04
                        artifact_name: linux
                    -   platform: windows-latest
                        artifact_name: windows

        runs-on: ${{ matrix.platform }}

        steps:
            -   uses: actions/checkout@v4
                with:
                    submodules: false

            -   name: Install Linux system dependencies
                if: matrix.platform == 'ubuntu-22.04'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version: '24'

            -   name: Enable Corepack
                run: corepack enable

            -   name: Activate pnpm
                run: corepack prepare pnpm@latest --activate

            -   name: Verify toolchain
                shell: bash
                run: |
                    node --version
                    corepack --version
                    pnpm --version

            -   name: Init only needed submodules
                run: |
                    git submodule update --init ./apps/app
                    git submodule update --init ./packages/types
                    git submodule update --init ./packages/logger
                    git submodule update --init ./packages/color-picker
                    git submodule update --init ./packages/contexify
                    git submodule update --init ./packages/ui-core
                    git submodule update --init ./packages/ui-web
                    git submodule update --init ./packages/validators
                    git submodule update --init ./packages/bitfield
                    git submodule update --init ./tooling/eslint-config

            -   name: Install dependencies
                run: pnpm i

            -   name: Build peer dependencies
                run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/color-picker" --filter="./packages/contexify" --filter="./packages/ui-core"

            -   name: Build dependencies
                run: pnpm turbo run build --filter="./packages/ui-web" --filter="./packages/validators" --filter="./packages/bitfield"

            -   name: Build app (electron-vite)
                working-directory: apps/app
                run: pnpm exec electron-vite build

            -   name: Flatten with pnpm deploy
                shell: bash
                run: pnpm deploy --filter=@mutualzz/app --prod ./deploy/app

            -   name: Copy build output into deploy directory
                shell: bash
                run: |
                    cp -r apps/app/out            ./deploy/app/out
                    cp    apps/app/electron-builder.yml ./deploy/app/electron-builder.yml
                    if [ -d apps/app/resources ]; then
                      cp -r apps/app/resources    ./deploy/app/resources
                    fi
                    if [ -d apps/app/build ]; then
                      cp -r apps/app/build        ./deploy/app/build
                    fi

            -   name: Fix app-builder permissions (Linux)
                if: matrix.platform == 'ubuntu-22.04'
                run: chmod +x ./deploy/app/node_modules/app-builder-bin/linux/x64/app-builder

            -   name: Build app package (macOS)
                if: matrix.platform == 'macos-latest'
                working-directory: deploy/app
                run: |
                    ulimit -n 10240
                    pnpm exec electron-builder --mac --publish never
                env:
                    APPLE_ID: ${{ secrets.APPLE_ID }}
                    APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                    APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                    APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                    APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                    APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                    CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
                    CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

            -   name: Build app package (Windows)
                if: matrix.platform == 'windows-latest'
                working-directory: deploy/app
                shell: bash
                run: pnpm exec electron-builder --win --publish never

            -   name: Build app package (Linux)
                if: matrix.platform == 'ubuntu-22.04'
                working-directory: deploy/app
                run: pnpm exec electron-builder --linux --publish never

            -   name: Collect artifacts
                shell: bash
                run: |
                    mkdir -p release

                    if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
                      EXE=$(ls ./deploy/app/dist/*.exe 2>/dev/null | head -n1)
                      [[ -f "$EXE" ]] && cp "$EXE" ./release/MutualzzSetup.exe
                    fi

                    if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
                      DMG=$(ls ./deploy/app/dist/*.dmg 2>/dev/null | head -n1)
                      [[ -f "$DMG" ]] && cp "$DMG" ./release/Mutualzz.dmg
                    fi

                    if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
                      DEB=$(ls ./deploy/app/dist/*.deb 2>/dev/null | head -n1)
                      APPIMAGE=$(ls ./deploy/app/dist/*.AppImage 2>/dev/null | head -n1)
                      [[ -f "$DEB" ]]      && cp "$DEB"      ./release/Mutualzz.deb
                      [[ -f "$APPIMAGE" ]] && cp "$APPIMAGE" ./release/Mutualzz.AppImage
                    fi

            -   name: Upload artifacts
                uses: actions/upload-artifact@v4
                with:
                    name: release-${{ matrix.artifact_name }}
                    path: release/
                    if-no-files-found: warn
                    retention-days: 1

    release:
        name: Publish Release
        needs: build-binaries
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   uses: actions/checkout@v4
                with:
                    submodules: false

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version: '24'

            -   name: Download all artifacts
                uses: actions/download-artifact@v4
                with:
                    pattern: release-*
                    path: release/
                    merge-multiple: true

            -   name: List collected artifacts
                run: ls -lah release/

            -   name: Read app version
                id: version
                run: |
                    VERSION=$(node -p "require('./apps/app/package.json').version")
                    echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            -   name: Read changelog
                id: changelog
                shell: bash
                run: |
                    if [ -f CHANGELOG.md ]; then
                      delim="CHANGELOG_$(date +%s)_$RANDOM"
                      {
                        echo "body<<$delim"
                        cat CHANGELOG.md
                        echo
                        echo "$delim"
                      } >> "$GITHUB_OUTPUT"
                    else
                      echo "body=" >> "$GITHUB_OUTPUT"
                    fi

            -   name: Create GitHub release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: v${{ steps.version.outputs.version }}
                    name: Mutualzz v${{ steps.version.outputs.version }}
                    body: ${{ steps.changelog.outputs.body }}
                    draft: false
                    prerelease: false
                    overwrite_files: true
                    files: |
                        release/MutualzzSetup.exe
                        release/Mutualzz.dmg
                        release/Mutualzz.deb
                        release/Mutualzz.AppImage
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Install Wrangler
                run: npm install -g wrangler

            -   name: Upload binaries to R2
                shell: bash
                env:
                    CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
                    CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
                run: |
                    upload() {
                      local src="$1" dest="$2"
                      if [[ -f "$src" ]]; then
                        echo "Uploading $src → $dest"
                        wrangler r2 object put "$dest" --file "$src" --remote
                      else
                        echo "Skipping $dest (file not found)"
                      fi
                    }

                    upload "release/MutualzzSetup.exe"  "mutualzz/releases/latest/MutualzzSetup.exe"
                    upload "release/Mutualzz.dmg"       "mutualzz/releases/latest/Mutualzz.dmg"
                    upload "release/Mutualzz.deb"       "mutualzz/releases/latest/Mutualzz.deb"
                    upload "release/Mutualzz.AppImage"  "mutualzz/releases/latest/Mutualzz.AppImage"

            -   name: Generate and upload latest.json
                shell: bash
                env:
                    CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
                    CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
                run: |
                    cat <<EOF > latest.json
                    {
                      "version": "${{ steps.version.outputs.version }}",
                      "win": "https://proxy.mutualzz.com/releases/latest/MutualzzSetup.exe",
                      "osx": "https://proxy.mutualzz.com/releases/latest/Mutualzz.dmg",
                      "linux": {
                        "debian": "https://proxy.mutualzz.com/releases/latest/Mutualzz.deb",
                        "appimage": "https://proxy.mutualzz.com/releases/latest/Mutualzz.AppImage"
                      }
                    }
                    EOF

                    wrangler r2 object put "mutualzz/releases/latest/latest.json" --file latest.json --remote
                    echo "latest.json uploaded"
