name: Release (Electron + Netlify)

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  deploy-web:
    name: Deploy Web version to Netlify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Verify toolchain
        shell: bash
        run: |
          node --version
          corepack --version
          pnpm --version

      - name: Init only needed submodules
        run: |
          git submodule update --init ./apps/app
          git submodule update --init ./packages/types
          git submodule update --init ./packages/logger
          git submodule update --init ./packages/color-picker
          git submodule update --init ./packages/contexify
          git submodule update --init ./packages/ui-core
          git submodule update --init ./packages/ui-web
          git submodule update --init ./packages/validators
          git submodule update --init ./packages/bitfield
          git submodule update --init ./tooling/eslint-config

      - name: Install dependencies
        run: pnpm i --ignore-scripts

      - name: Build all packages
        run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/ui-core" --filter="./packages/ui-web" --filter="./packages/validators" --filter="./packages/bitfield" --filter="./packages/color-picker" --filter="./packages/contexify"

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: pnpx netlify deploy --cwd apps/app --prod --site=94e51d96-ca0f-4128-bda5-7f22eb07fcc5 --message "${{ github.event.head_commit.message }}"

  build-binaries:
    name: Build Binaries (${{ matrix.platform }})
    needs: deploy-web
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact_name: macos
          - platform: ubuntu-22.04
            artifact_name: linux
          - platform: windows-latest
            artifact_name: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse \
            libfuse2

      - name: Install macOS build dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          brew install pkg-config cairo pango libpng jpeg giflib librsvg pixman
          pip3 install setuptools --break-system-packages

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Verify toolchain
        shell: bash
        run: |
          node --version
          corepack --version
          pnpm --version

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Init only needed submodules
        run: |
          git submodule update --init ./apps/app
          git submodule update --init ./packages/types
          git submodule update --init ./packages/logger
          git submodule update --init ./packages/color-picker
          git submodule update --init ./packages/contexify
          git submodule update --init ./packages/ui-core
          git submodule update --init ./packages/ui-web
          git submodule update --init ./packages/validators
          git submodule update --init ./packages/bitfield
          git submodule update --init ./tooling/eslint-config

      - name: Install dependencies
        run: pnpm i --ignore-scripts

      - name: Rebuild native modules
        run: pnpm rebuild canvas zlib-sync bufferutil esbuild @swc/core @parcel/watcher sharp unrs-resolver electron

      - name: Build all packages
        run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/ui-core" --filter="./packages/ui-web" --filter="./packages/validators" --filter="./packages/bitfield" --filter="./packages/color-picker" --filter="./packages/contexify"

      - name: Build app (electron-vite)
        working-directory: apps/app
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm exec electron-vite build

      - name: Download bootstrapper binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p apps/app/resources

          # Show latest updater release
          echo "Latest updater release:"
          gh release view --repo mutualzz/updater --json tagName,publishedAt

          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            gh release download --repo mutualzz/updater \
              --pattern "updater-macos-x64" \
              --dir /tmp/updater-bins/ \
              --clobber
            gh release download --repo mutualzz/updater \
              --pattern "updater-macos-arm64" \
              --dir /tmp/updater-bins/ \
              --clobber

            lipo -create \
              /tmp/updater-bins/updater-macos-x64 \
              /tmp/updater-bins/updater-macos-arm64 \
              -output apps/app/resources/updater

            chmod +x apps/app/resources/updater
          fi

          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            gh release download --repo mutualzz/updater \
              --pattern "updater-windows-x64.exe" \
              --dir apps/app/resources/ \
              --clobber
            mv apps/app/resources/updater-windows-x64.exe \
               apps/app/resources/updater.exe
          fi

          if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            gh release download --repo mutualzz/updater \
              --pattern "updater-linux-x64" \
              --dir apps/app/resources/ \
              --clobber
            mv apps/app/resources/updater-linux-x64 \
               apps/app/resources/updater
            chmod +x apps/app/resources/updater
          fi

      - name: Setup macOS keychain
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "build-keychain-password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build-keychain-password" build.keychain
          security set-keychain-settings -t 21600 build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "build-keychain-password" \
            build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security unlock-keychain -p "build-keychain-password" build.keychain
          rm /tmp/certificate.p12

      - name: Build app package (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: apps/app
        run: |
          ulimit -n 65536
          pnpm exec electron-builder --mac --publish never
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Download VC++ Redistributable
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $dest = "apps/app/resources/vc_redist.x64.exe"
          Write-Host "Downloading VC++ Redistributable..."
          Invoke-WebRequest -Uri $url -OutFile $dest
          Write-Host "Downloaded: $(Get-Item $dest | Select-Object -ExpandProperty Length) bytes"

      - name: Build app package (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: apps/app
        shell: bash
        run: pnpm exec electron-builder --win --publish never

      - name: Build app package (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: apps/app
        run: pnpm exec electron-builder --linux --publish never

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release

          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            EXE=$(ls ./apps/app/dist/*.exe 2>/dev/null | head -n1)
            [[ -f "$EXE" ]] && cp "$EXE" ./release/MutualzzSetup.exe

            ASAR="./apps/app/dist/win-unpacked/resources/app.asar"
            [[ -f "$ASAR" ]] && cp "$ASAR" ./release/Mutualzz.asar

            pnpm exec node -p "require('electron/package.json').version" > ./release/electron-version.txt
          fi

          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            DMG=$(ls ./apps/app/dist/*.dmg 2>/dev/null | head -n1)
            [[ -f "$DMG" ]] && cp "$DMG" ./release/Mutualzz.dmg
          fi

          if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            DEB=$(ls ./apps/app/dist/*.deb 2>/dev/null | head -n1)
            APPIMAGE=$(ls ./apps/app/dist/*.AppImage 2>/dev/null | head -n1)
            [[ -f "$DEB" ]]      && cp "$DEB"      ./release/Mutualzz.deb
            [[ -f "$APPIMAGE" ]] && cp "$APPIMAGE" ./release/Mutualzz.AppImage
          fi

      - name: Cleanup keychain
        if: matrix.platform == 'macos-latest' && always()
        run: security delete-keychain build.keychain || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: release/
          if-no-files-found: warn
          retention-days: 1

  build-mobile:
    name: Build Mobile (${{ matrix.target }})
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: android
          - platform: macos-latest
            target: ios

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Init only needed submodules
        run: |
          git submodule update --init ./apps/mobile
          git submodule update --init ./packages/types
          git submodule update --init ./packages/logger
          git submodule update --init ./packages/ui-core
          git submodule update --init ./packages/ui-native
          git submodule update --init ./packages/validators
          git submodule update --init ./packages/bitfield
          git submodule update --init ./tooling/eslint-config

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-mobile-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-mobile-

      - name: Install dependencies
        run: pnpm i

      - name: Build workspace packages
        run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/ui-core" --filter="./packages/ui-native" --filter="./packages/validators" --filter="./packages/bitfield"

      - name: Setup Java
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      - name: Prebuild Android project
        if: matrix.target == 'android'
        working-directory: apps/mobile
        env:
          CI: "1"
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Decode Android keystore
        if: matrix.target == 'android'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/app/release.keystore

      - name: Patch Android release signing config
        if: matrix.target == 'android'
        shell: bash
        run: |
          cat <<'EOF' > /tmp/patch-android-signing.mjs
          import fs from "node:fs";

          const path = "apps/mobile/android/app/build.gradle";
          let gradle = fs.readFileSync(path, "utf8");

          if (!gradle.includes("signingConfigs.release")) {
            gradle = gradle.replace(
              /signingConfigs\s*\{([\s\S]*?debug\s*\{[\s\S]*?\}\s*)\}/,
              (match, debugBlock) => `signingConfigs {${debugBlock}
                  release {
                      storeFile file(System.getenv("ANDROID_RELEASE_STORE_FILE"))
                      storePassword System.getenv("ANDROID_RELEASE_STORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_RELEASE_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_RELEASE_KEY_PASSWORD")
                  }
              }`
            );

            gradle = gradle.replace(
              /(release\s*\{[\s\S]*?)signingConfig signingConfigs\.debug/,
              "$1signingConfig signingConfigs.release"
            );

            fs.writeFileSync(path, gradle);
            console.log("Patched build.gradle with release signing config");
          }
          EOF
          node /tmp/patch-android-signing.mjs
          sed -i "s/versionCode [0-9]\+/versionCode ${{ github.run_number }}/" apps/mobile/android/app/build.gradle

      - name: Build Android release (AAB + APK)
        if: matrix.target == 'android'
        working-directory: apps/mobile/android
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ github.workspace }}/apps/mobile/android/app/release.keystore
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Collect Android artifacts
        if: matrix.target == 'android'
        shell: bash
        run: |
          mkdir -p release
          AAB=$(ls apps/mobile/android/app/build/outputs/bundle/release/*.aab 2>/dev/null | head -n1)
          APK=$(ls apps/mobile/android/app/build/outputs/apk/release/*.apk 2>/dev/null | head -n1)
          [[ -f "$AAB" ]] && cp "$AAB" ./release/Mutualzz.aab
          [[ -f "$APK" ]] && cp "$APK" ./release/Mutualzz.apk

      - name: Prebuild iOS project
        if: matrix.target == 'ios'
        working-directory: apps/mobile
        env:
          CI: "1"
        run: pnpm exec expo prebuild --platform ios --no-install

      - name: Install CocoaPods dependencies
        if: matrix.target == 'ios'
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Setup iOS signing
        if: matrix.target == 'ios'
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          echo "Decoding certificate (corruption-safe)..."
          printf "%s" "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" \
            | tr -d '\n\r' \
            | base64 --decode > /tmp/ios_distribution.p12

          echo "Decoding provisioning profile..."
          printf "%s" "$IOS_PROVISIONING_PROFILE_BASE64" \
            | tr -d '\n\r' \
            | base64 --decode > /tmp/profile.mobileprovision

          echo "Validating certificate file..."
          ls -lh /tmp/ios_distribution.p12
          file /tmp/ios_distribution.p12

          echo "Testing PKCS12 integrity..."
          openssl pkcs12 -info \
            -in /tmp/ios_distribution.p12 \
            -nokeys \
            -passin pass:"$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" >/dev/null

          echo "Creating keychain..."
          security create-keychain -p "build-keychain-password" ios-build.keychain
          security default-keychain -s ios-build.keychain
          security unlock-keychain -p "build-keychain-password" ios-build.keychain
          security set-keychain-settings -t 21600 ios-build.keychain

          echo "Importing certificate..."
          security import /tmp/ios_distribution.p12 \
            -k ios-build.keychain \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "build-keychain-password" \
            ios-build.keychain

          security list-keychains -d user -s ios-build.keychain $(security list-keychains -d user | tr -d '"')

          echo "Installing provisioning profile..."
          mkdir -p ~/Library/MobileDevice/"Provisioning Profiles"

          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision \
            | plutil -extract UUID xml1 -o - - \
            | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')

          PROFILE_NAME=$(security cms -D -i /tmp/profile.mobileprovision \
            | plutil -extract Name xml1 -o - - \
            | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')

          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/"Provisioning Profiles"/"$PROFILE_UUID.mobileprovision"

          CODE_SIGN_IDENTITY=$(security find-identity -v -p codesigning ios-build.keychain \
            | grep -m1 "Apple Distribution" \
            | sed -E 's/.*"(.*)"/\1/')

          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "CODE_SIGN_IDENTITY=$CODE_SIGN_IDENTITY" >> "$GITHUB_ENV"

      - name: Archive and export IPA
        if: matrix.target == 'ios'
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD }}
        run: |
          WORKSPACE=$(ls apps/mobile/ios/*.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          ARCHIVE_PATH="$RUNNER_TEMP/Mutualzz.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"
          METHOD="${IOS_EXPORT_METHOD:-app-store}"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

          cat <<PLIST > "$RUNNER_TEMP/ExportOptions.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>$METHOD</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.mutualzz.app</key>
                  <string>$PROFILE_NAME</string>
              </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Collect iOS artifacts
        if: matrix.target == 'ios'
        shell: bash
        run: |
          mkdir -p release
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa 2>/dev/null | head -n1)
          [[ -f "$IPA" ]] && cp "$IPA" ./release/Mutualzz.ipa

      - name: Cleanup iOS keychain
        if: matrix.target == 'ios' && always()
        run: security delete-keychain ios-build.keychain || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mobile-${{ matrix.target }}
          path: release/
          if-no-files-found: warn
          retention-days: 1

  publish-r2:
    name: Upload to R2
    needs: [build-binaries, build-mobile]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Init app submodule (for version)
        run: git submodule update --init ./apps/app

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release/
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lah release/

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/app/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read electron version
        id: electron_version
        shell: bash
        run: |
          if [ -f release/electron-version.txt ]; then
            echo "version=$(tr -d '[:space:]' < release/electron-version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate sha256 checksums
        id: checksums
        shell: bash
        run: |
          sha256() { sha256sum "$1" 2>/dev/null | awk '{print $1}'; }

          echo "win=$(sha256 release/MutualzzSetup.exe)"       >> "$GITHUB_OUTPUT"
          echo "osx=$(sha256 release/Mutualzz.dmg)"            >> "$GITHUB_OUTPUT"
          echo "deb=$(sha256 release/Mutualzz.deb)"            >> "$GITHUB_OUTPUT"
          echo "appimage=$(sha256 release/Mutualzz.AppImage)"  >> "$GITHUB_OUTPUT"
          echo "asar=$(sha256 release/Mutualzz.asar)"          >> "$GITHUB_OUTPUT"
          echo "apk=$(sha256 release/Mutualzz.apk)"            >> "$GITHUB_OUTPUT"
          echo "aab=$(sha256 release/Mutualzz.aab)"            >> "$GITHUB_OUTPUT"
          echo "ipa=$(sha256 release/Mutualzz.ipa)"            >> "$GITHUB_OUTPUT"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Generate latest.json
        shell: bash
        run: |
          cat <<EOF > latest.json
          {
            "version": "${{ steps.version.outputs.version }}",
            "win": {
              "x64": {
                "url": "https://proxy.mutualzz.com/releases/latest/MutualzzSetup.exe",
                "sha256": "${{ steps.checksums.outputs.win }}",
                "electronVersion": "${{ steps.electron_version.outputs.version }}",
                "asar": {
                  "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.asar",
                  "sha256": "${{ steps.checksums.outputs.asar }}"
                }
              }
            },
            "osx": {
              "universal": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.dmg",
                "sha256": "${{ steps.checksums.outputs.osx }}"
              }
            },
            "linux": {
              "debian": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.deb",
                "sha256": "${{ steps.checksums.outputs.deb }}"
              },
              "appimage": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.AppImage",
                "sha256": "${{ steps.checksums.outputs.appimage }}"
              }
            },
            "android": {
              "apk": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.apk",
                "sha256": "${{ steps.checksums.outputs.apk }}"
              },
              "aab": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.aab",
                "sha256": "${{ steps.checksums.outputs.aab }}"
              }
            },
            "ios": {
              "ipa": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.ipa",
                "sha256": "${{ steps.checksums.outputs.ipa }}"
              }
            }
          }
          EOF
          echo "latest.json generated"

      - name: Upload to R2
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          upload() {
            local src="$1" dest="$2"
            if [[ -f "$src" ]]; then
              echo "Uploading $src -> $dest"
              wrangler r2 object put "$dest" --file "$src" --remote
            else
              echo "Skipping $dest (file not found)"
            fi
          }

          upload "release/MutualzzSetup.exe"  "mutualzz/releases/latest/MutualzzSetup.exe"
          upload "release/Mutualzz.dmg"       "mutualzz/releases/latest/Mutualzz.dmg"
          upload "release/Mutualzz.deb"       "mutualzz/releases/latest/Mutualzz.deb"
          upload "release/Mutualzz.AppImage"  "mutualzz/releases/latest/Mutualzz.AppImage"
          upload "release/Mutualzz.asar"      "mutualzz/releases/latest/Mutualzz.asar"
          upload "release/Mutualzz.apk"       "mutualzz/releases/latest/Mutualzz.apk"
          upload "release/Mutualzz.aab"       "mutualzz/releases/latest/Mutualzz.aab"
          upload "release/Mutualzz.ipa"       "mutualzz/releases/latest/Mutualzz.ipa"

          # latest.json goes up last -- only live once all binaries are in place
          upload "latest.json"                "mutualzz/releases/latest/latest.json"

  github-release:
    name: Create GitHub Release
    needs: publish-r2
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Init app submodule (for version)
        run: git submodule update --init ./apps/app

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release/
          merge-multiple: true

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/app/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          if [ -f CHANGELOG.md ]; then
            delim="CHANGELOG_$(date +%s)_$RANDOM"
            {
              echo "body<<$delim"
              head -c 65000 CHANGELOG.md
              echo
              echo "$delim"
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Mutualzz v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            release/MutualzzSetup.exe
            release/Mutualzz.dmg
            release/Mutualzz.deb
            release/Mutualzz.AppImage
            release/Mutualzz.asar
            release/Mutualzz.apk
            release/Mutualzz.aab
            release/Mutualzz.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
