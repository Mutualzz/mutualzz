name: Release (Electron + Netlify)

on:
    workflow_dispatch:
    push:
        branches:
            - release

jobs:
    deploy-web:
        name: Deploy Web version to Netlify
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4
                with:
                    submodules: false

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version: '24.11.1'

            -   name: Enable Corepack
                run: corepack enable

            -   name: Activate pnpm
                run: corepack prepare pnpm@latest --activate

            -   name: Verify toolchain
                shell: bash
                run: |
                    node --version
                    corepack --version
                    pnpm --version

            -   name: Init only needed submodules
                run: |
                    git submodule update --init ./apps/app
                    git submodule update --init ./packages/types
                    git submodule update --init ./packages/logger
                    git submodule update --init ./packages/color-picker
                    git submodule update --init ./packages/contexify
                    git submodule update --init ./packages/ui-core
                    git submodule update --init ./packages/ui-web
                    git submodule update --init ./packages/validators
                    git submodule update --init ./packages/bitfield
                    git submodule update --init ./tooling/eslint-config

            -   name: Install dependencies (we ignore scripts, because web doesn't have native deps)
                run: pnpm i --ignore scripts

            -   name: Build peer dependencies
                run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/color-picker" --filter="./packages/contexify" --filter="./packages/ui-core"

            -   name: Build dependencies
                run: pnpm turbo run build --filter="./packages/ui-web" --filter="./packages/validators" --filter="./packages/bitfield"

            -   name: Deploy to Netlify
                env:
                    NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
                run: pnpx netlify deploy --cwd apps/app --prod --site=94e51d96-ca0f-4128-bda5-7f22eb07fcc5 --message "${{ github.event.head_commit.message }}"

    deploy-bin:
        name: Build & Release Binaries (${{ matrix.platform }})
        needs: deploy-web
        permissions:
            contents: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    -   platform: macos-latest
                        build_script: build:mac
                    -   platform: ubuntu-22.04
                        build_script: build:linux
                    -   platform: windows-latest
                        build_script: build:win

        runs-on: ${{ matrix.platform }}

        steps:
            -   uses: actions/checkout@v4
                with:
                    submodules: false

            -   name: Install Linux system dependencies
                if: matrix.platform == 'ubuntu-22.04'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version: '24.11.1'

            -   name: Enable Corepack
                run: corepack enable

            -   name: Activate pnpm
                run: corepack prepare pnpm@latest --activate

            -   name: Verify toolchain
                shell: bash
                run: |
                    node --version
                    corepack --version
                    pnpm --version

            -   name: Init only needed submodules
                run: |
                    git submodule update --init ./apps/app
                    git submodule update --init ./packages/types
                    git submodule update --init ./packages/logger
                    git submodule update --init ./packages/color-picker
                    git submodule update --init ./packages/contexify
                    git submodule update --init ./packages/ui-core
                    git submodule update --init ./packages/ui-web
                    git submodule update --init ./packages/validators
                    git submodule update --init ./packages/bitfield
                    git submodule update --init ./tooling/eslint-config

            -   name: Install dependencies (scripts enabled for Electron native deps)
                run: pnpm i

            -   name: Build peer dependencies
                run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/color-picker" --filter="./packages/contexify" --filter="./packages/ui-core"

            -   name: Build dependencies
                run: pnpm turbo run build --filter="./packages/ui-web" --filter="./packages/validators" --filter="./packages/bitfield"

            -   name: Rebuild only Electron-native modules needed by app
                working-directory: apps/app
                run: pnpm rebuild keytar erlpack

            -   name: Fix app-builder permissions
                if: matrix.platform == 'ubuntu-22.04'
                run: chmod +x ./node_modules/app-builder-bin/linux/x64/app-builder

            -   name: Read app version
                id: version
                shell: bash
                run: |
                    VERSION=$(node -p "require('./apps/app/package.json').version")
                    echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            -   name: Build app package
                working-directory: apps/app
                run: pnpm ${{ matrix.build_script }}
                env:
                    UV_THREADPOOL_SIZE: 64
                    APPLE_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_ID || '' }}
                    APPLE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_PASSWORD || '' }}
                    APPLE_TEAM_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
                    APPLE_CERTIFICATE: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE || '' }}
                    APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
                    APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_SIGNING_IDENTITY || '' }}
                    CSC_LINK: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE || '' }}
                    CSC_KEY_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}

            -   name: Rename artifacts for release
                shell: bash
                run: |
                    mkdir -p release

                    if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
                      EXE=$(ls ./apps/app/dist/*.exe 2>/dev/null | head -n1)
                      if [[ -f "$EXE" ]]; then
                        cp "$EXE" ./release/MutualzzSetup.exe
                      fi
                    fi

                    if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
                      DMG=$(ls ./apps/app/dist/*.dmg 2>/dev/null | head -n1)
                      if [[ -f "$DMG" ]]; then
                        cp "$DMG" ./release/Mutualzz.dmg
                      fi
                    fi

                    if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
                      DEB=$(ls ./apps/app/dist/*.deb 2>/dev/null | head -n1)
                      RPM=$(ls ./apps/app/dist/*.rpm 2>/dev/null | head -n1)
                      APPIMAGE=$(ls ./apps/app/dist/*.AppImage 2>/dev/null | head -n1)

                      if [[ -f "$DEB" ]]; then
                        cp "$DEB" ./release/Mutualzz.deb
                      fi

                      if [[ -f "$RPM" ]]; then
                        cp "$RPM" ./release/Mutualzz.rpm
                      fi

                      if [[ -f "$APPIMAGE" ]]; then
                        cp "$APPIMAGE" ./release/Mutualzz.AppImage
                      fi
                    fi

            -   id: changelog
                if: matrix.platform == 'ubuntu-22.04'
                shell: bash
                run: |
                    if [ -f CHANGELOG.md ]; then
                      delim="CHANGELOG_$(date +%s)_$RANDOM"
                      {
                        echo "body<<$delim"
                        cat CHANGELOG.md
                        echo
                        echo "$delim"
                      } >> "$GITHUB_OUTPUT"
                    else
                      echo "body=" >> "$GITHUB_OUTPUT"
                    fi

            -   name: Create GitHub release
                if: matrix.platform == 'ubuntu-22.04'
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: v${{ steps.version.outputs.version }}
                    name: Mutualzz v${{ steps.version.outputs.version }}
                    body: ${{ steps.changelog.outputs.body }}
                    draft: false
                    prerelease: false
                    overwrite_files: true
                    files: |
                        release/MutualzzSetup.exe
                        release/Mutualzz.dmg
                        release/Mutualzz.deb
                        release/Mutualzz.rpm
                        release/Mutualzz.AppImage
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Install Wrangler
                run: npm install -g wrangler

            -   name: Upload binaries to R2
                shell: bash
                env:
                    R2_BUCKET: mutualzz
                    CLOUDFLARE_ENDPOINT: ${{ secrets.CLOUDFLARE_ENDPOINT }}
                    CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
                    CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
                run: |
                    echo "Uploading release artifacts for ${{ matrix.platform }}"

                    if [[ "${{ matrix.platform }}" == "windows-latest" && -f "./release/MutualzzSetup.exe" ]]; then
                      wrangler r2 object put "mutualzz/releases/latest/MutualzzSetup.exe" --file "./release/MutualzzSetup.exe" --remote
                    fi

                    if [[ "${{ matrix.platform }}" == "macos-latest" && -f "./release/Mutualzz.dmg" ]]; then
                      wrangler r2 object put "mutualzz/releases/latest/Mutualzz.dmg" --file "./release/Mutualzz.dmg" --remote
                    fi

                    if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
                      if [[ -f "./release/Mutualzz.deb" ]]; then
                        wrangler r2 object put "mutualzz/releases/latest/Mutualzz.deb" --file "./release/Mutualzz.deb" --remote
                      fi

                      if [[ -f "./release/Mutualzz.rpm" ]]; then
                        wrangler r2 object put "mutualzz/releases/latest/Mutualzz.rpm" --file "./release/Mutualzz.rpm" --remote
                      fi

                      if [[ -f "./release/Mutualzz.AppImage" ]]; then
                        wrangler r2 object put "mutualzz/releases/latest/Mutualzz.AppImage" --file "./release/Mutualzz.AppImage" --remote
                      fi
                    fi

            -   name: Generate latest.json
                if: matrix.platform == 'ubuntu-22.04'
                shell: bash
                run: |
                    cat <<EOF > latest.json
                    {
                      "win": "https://proxy.mutualzz.com/releases/latest/MutualzzSetup.exe",
                      "osx": "https://proxy.mutualzz.com/releases/latest/Mutualzz.dmg",
                      "linux": {
                        "debian": "https://proxy.mutualzz.com/releases/latest/Mutualzz.deb",
                        "rpm": "https://proxy.mutualzz.com/releases/latest/Mutualzz.rpm",
                        "appimage": "https://proxy.mutualzz.com/releases/latest/Mutualzz.AppImage"
                      }
                    }
                    EOF

                    wrangler r2 object put "mutualzz/releases/latest/latest.json" --file latest.json --remote
                    echo "latest.json uploaded"
