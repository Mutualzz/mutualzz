name: Release Desktop

on:
  workflow_dispatch:

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assert-master:
    name: Require master
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not master
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/master" ]]; then
            echo "::error::Releases must be dispatched from master (got ${{ github.ref }})"
            exit 1
          fi

  deploy-web:
    name: Deploy Web version to Netlify
    needs: [assert-master]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Verify toolchain
        shell: bash
        run: |
          node --version
          corepack --version
          pnpm --version

      - name: Init only needed submodules
        shell: bash
        run: |
          git submodule update --init --jobs 8 \
            ./apps/app \
            ./packages/types \
            ./packages/logger \
            ./packages/color-picker \
            ./packages/contexify \
            ./packages/ui-core \
            ./packages/ui-web \
            ./packages/validators \
            ./packages/bitfield \
            ./packages/i18n \
            ./tooling/eslint-config

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-desktop-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-desktop-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-desktop-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-desktop-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-desktop-

      - name: Install dependencies
        run: pnpm i --filter @mutualzz/app... --ignore-scripts

      - name: Build all packages
        run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/ui-core" --filter="./packages/ui-web" --filter="./packages/validators" --filter="./packages/bitfield" --filter="./packages/color-picker" --filter="./packages/contexify" --filter="./packages/i18n"

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: pnpx netlify deploy --cwd apps/app --prod --site=94e51d96-ca0f-4128-bda5-7f22eb07fcc5 --message "${{ github.event.head_commit.message }}"

  build-updater:
    name: Build Updater (${{ matrix.target }})
    needs: [assert-master]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: updater-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: updater-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: updater-windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: updater-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init updater submodule
        run: git submodule update --init ./packages/updater

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/updater/target
          key: ${{ runner.os }}-${{ matrix.target }}-updater-${{ hashFiles('packages/updater/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-updater-

      - name: Build release binary
        working-directory: packages/updater
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: packages/updater
        run: |
          cp target/${{ matrix.target }}/release/updater \
             ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: packages/updater
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/updater.exe \
             ${{ matrix.artifact }}.exe

      - name: Write updater version
        working-directory: packages/updater
        shell: bash
        run: |
          UPDATER_VER=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          if [[ -z "$UPDATER_VER" ]]; then
            echo "Failed to read updater version from Cargo.toml" >&2
            exit 1
          fi
          echo "$UPDATER_VER" > updater-version.txt
          echo "Updater version: $UPDATER_VER"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/updater/${{ matrix.artifact }}
            packages/updater/${{ matrix.artifact }}.exe
            packages/updater/updater-version.txt
          if-no-files-found: warn
          retention-days: 1

  build-binaries:
    name: Build Binaries (${{ matrix.platform }})
    needs: [deploy-web, build-updater]
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact_name: macos
          - platform: ubuntu-22.04
            artifact_name: linux
          - platform: windows-latest
            artifact_name: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse \
            libfuse2 \
            rpm \
            fakeroot \
            libarchive-tools

      - name: Install macOS build dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          brew install pkg-config cairo pango libpng jpeg giflib librsvg pixman
          pip3 install setuptools --break-system-packages

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Verify toolchain
        shell: bash
        run: |
          node --version
          corepack --version
          pnpm --version

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-desktop-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-desktop-

      - name: Init only needed submodules
        shell: bash
        run: |
          git submodule update --init --jobs 8 \
            ./apps/app \
            ./packages/types \
            ./packages/logger \
            ./packages/color-picker \
            ./packages/contexify \
            ./packages/ui-core \
            ./packages/ui-web \
            ./packages/validators \
            ./packages/bitfield \
            ./packages/i18n \
            ./tooling/eslint-config

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-desktop-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-desktop-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-desktop-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
        run: pnpm i --filter @mutualzz/app... --ignore-scripts

      - name: Rebuild native modules
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
        run: pnpm rebuild canvas zlib-sync bufferutil esbuild @swc/core @parcel/watcher sharp unrs-resolver electron

      - name: Build all packages
        run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/ui-core" --filter="./packages/ui-web" --filter="./packages/validators" --filter="./packages/bitfield" --filter="./packages/color-picker" --filter="./packages/contexify" --filter="./packages/i18n"

      - name: Build app (electron-vite)
        working-directory: apps/app
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm exec electron-vite build

      - name: Download updater binaries
        uses: actions/download-artifact@v4
        with:
          pattern: updater-*
          path: updater-bins/
          merge-multiple: true

      - name: Place bootstrapper binary
        shell: bash
        run: |
          mkdir -p apps/app/resources
          ls -lah updater-bins/

          if [[ ! -f updater-bins/updater-version.txt ]]; then
            echo "updater-version.txt missing from updater artifacts" >&2
            exit 1
          fi
          cp updater-bins/updater-version.txt apps/app/resources/updater-version.txt
          echo "Updater version: $(tr -d '[:space:]' < apps/app/resources/updater-version.txt)"

          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            lipo -create \
              updater-bins/updater-macos-x64 \
              updater-bins/updater-macos-arm64 \
              -output apps/app/resources/updater
            chmod +x apps/app/resources/updater
          fi

          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            cp updater-bins/updater-windows-x64.exe \
               apps/app/resources/updater.exe
          fi

          if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            cp updater-bins/updater-linux-x64 \
               apps/app/resources/updater
            chmod +x apps/app/resources/updater
          fi

      - name: Setup macOS keychain
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "build-keychain-password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build-keychain-password" build.keychain
          security set-keychain-settings -t 21600 build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "build-keychain-password" \
            build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security unlock-keychain -p "build-keychain-password" build.keychain
          rm /tmp/certificate.p12

      - name: Build app package (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: apps/app
        run: |
          ulimit -n 65536
          pnpm exec electron-builder --mac --publish never
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Download VC++ Redistributable
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $dest = "apps/app/resources/vc_redist.x64.exe"
          Write-Host "Downloading VC++ Redistributable..."
          Invoke-WebRequest -Uri $url -OutFile $dest
          Write-Host "Downloaded: $(Get-Item $dest | Select-Object -ExpandProperty Length) bytes"

      - name: Build app package (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: apps/app
        shell: bash
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
        run: pnpm exec electron-builder --win --publish never

      - name: Build app package (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: apps/app
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
        run: pnpm exec electron-builder --linux --publish never

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          shopt -s nullglob

          first_match() {
            local f
            for f in "$@"; do
              if [[ -f "$f" ]]; then
                printf '%s\n' "$f"
                return 0
              fi
            done
            return 0
          }

          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            EXE=$(first_match ./apps/app/dist/*.exe)
            if [[ -n "$EXE" ]]; then
              cp "$EXE" ./release/MutualzzSetup.exe
            fi

            ASAR="./apps/app/dist/win-unpacked/resources/app.asar"
            if [[ -f "$ASAR" ]]; then
              cp "$ASAR" ./release/Mutualzz-win.asar
            fi

            if [[ -f apps/app/resources/updater.exe ]]; then
              cp apps/app/resources/updater.exe ./release/updater-win.exe
            fi
            if [[ -f apps/app/resources/updater-version.txt ]]; then
              cp apps/app/resources/updater-version.txt ./release/updater-version.txt
            fi

            pnpm exec node -p "require('electron/package.json').version" > ./release/electron-version.txt
          fi

          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            DMG=$(first_match ./apps/app/dist/*.dmg)
            if [[ -n "$DMG" ]]; then
              cp "$DMG" ./release/Mutualzz.dmg
            fi

            ASAR=$(find ./apps/app/dist -path '*/Contents/Resources/app.asar' -print -quit 2>/dev/null || true)
            if [[ -f "$ASAR" ]]; then
              cp "$ASAR" ./release/Mutualzz-mac.asar
            fi

            if [[ -f apps/app/resources/updater ]]; then
              cp apps/app/resources/updater ./release/updater-mac
            fi
            if [[ -f apps/app/resources/updater-version.txt ]]; then
              cp apps/app/resources/updater-version.txt ./release/updater-version.txt
            fi

            pnpm exec node -p "require('electron/package.json').version" > ./release/electron-version.txt
          fi

          if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            DEB=$(first_match ./apps/app/dist/*.deb)
            APPIMAGE=$(first_match ./apps/app/dist/*.AppImage)
            RPM=$(first_match ./apps/app/dist/*.rpm)
            PACMAN=$(first_match ./apps/app/dist/*.pacman ./apps/app/dist/*.pkg.tar.*)

            if [[ -n "$DEB" ]]; then
              cp "$DEB" ./release/Mutualzz.deb
            fi
            if [[ -n "$APPIMAGE" ]]; then
              cp "$APPIMAGE" ./release/Mutualzz.AppImage
            fi
            if [[ -n "$RPM" ]]; then
              cp "$RPM" ./release/Mutualzz.rpm
            fi
            if [[ -n "$PACMAN" ]]; then
              cp "$PACMAN" ./release/Mutualzz.pacman
            fi

            ASAR="./apps/app/dist/linux-unpacked/resources/app.asar"
            if [[ ! -f "$ASAR" ]]; then
              ASAR=$(find ./apps/app/dist -path '*/resources/app.asar' -print -quit 2>/dev/null || true)
            fi
            if [[ -f "$ASAR" ]]; then
              cp "$ASAR" ./release/Mutualzz-linux.asar
            fi

            if [[ -f apps/app/resources/updater ]]; then
              cp apps/app/resources/updater ./release/updater-linux
            fi
            if [[ -f apps/app/resources/updater-version.txt ]]; then
              cp apps/app/resources/updater-version.txt ./release/updater-version.txt
            fi

            pnpm exec node -p "require('electron/package.json').version" > ./release/electron-version.txt
          fi

      - name: Cleanup keychain
        if: matrix.platform == 'macos-latest' && always()
        run: security delete-keychain build.keychain || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: release/
          if-no-files-found: warn
          retention-days: 1

  publish-r2:
    name: Upload to R2
    needs: [build-binaries]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Init app submodule (for version)
        run: git submodule update --init ./apps/app

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release/
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lah release/

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/app/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read electron version
        id: electron_version
        shell: bash
        run: |
          if [ -f release/electron-version.txt ]; then
            echo "version=$(tr -d '[:space:]' < release/electron-version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Read updater version
        id: updater_version
        shell: bash
        run: |
          if [ -f release/updater-version.txt ]; then
            echo "version=$(tr -d '[:space:]' < release/updater-version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate sha256 checksums
        id: checksums
        shell: bash
        run: |
          sha256() { sha256sum "$1" 2>/dev/null | awk '{print $1}'; }

          echo "win=$(sha256 release/MutualzzSetup.exe)"       >> "$GITHUB_OUTPUT"
          echo "osx=$(sha256 release/Mutualzz.dmg)"            >> "$GITHUB_OUTPUT"
          echo "deb=$(sha256 release/Mutualzz.deb)"            >> "$GITHUB_OUTPUT"
          echo "appimage=$(sha256 release/Mutualzz.AppImage)"  >> "$GITHUB_OUTPUT"
          echo "rpm=$(sha256 release/Mutualzz.rpm)"            >> "$GITHUB_OUTPUT"
          echo "pacman=$(sha256 release/Mutualzz.pacman)"      >> "$GITHUB_OUTPUT"
          echo "asar_win=$(sha256 release/Mutualzz-win.asar)"  >> "$GITHUB_OUTPUT"
          echo "asar_mac=$(sha256 release/Mutualzz-mac.asar)"  >> "$GITHUB_OUTPUT"
          echo "asar_linux=$(sha256 release/Mutualzz-linux.asar)" >> "$GITHUB_OUTPUT"
          echo "updater_win=$(sha256 release/updater-win.exe)" >> "$GITHUB_OUTPUT"
          echo "updater_mac=$(sha256 release/updater-mac)"     >> "$GITHUB_OUTPUT"
          echo "updater_linux=$(sha256 release/updater-linux)" >> "$GITHUB_OUTPUT"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Generate latest.json
        shell: bash
        run: |
          cat <<EOF > latest.json
          {
            "version": "${{ steps.version.outputs.version }}",
            "win": {
              "x64": {
                "url": "https://proxy.mutualzz.com/releases/latest/MutualzzSetup.exe",
                "sha256": "${{ steps.checksums.outputs.win }}",
                "electronVersion": "${{ steps.electron_version.outputs.version }}",
                "updaterVersion": "${{ steps.updater_version.outputs.version }}",
                "updaterSha256": "${{ steps.checksums.outputs.updater_win }}",
                "asar": {
                  "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz-win.asar",
                  "sha256": "${{ steps.checksums.outputs.asar_win }}"
                }
              }
            },
            "osx": {
              "universal": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.dmg",
                "sha256": "${{ steps.checksums.outputs.osx }}",
                "electronVersion": "${{ steps.electron_version.outputs.version }}",
                "updaterVersion": "${{ steps.updater_version.outputs.version }}",
                "updaterSha256": "${{ steps.checksums.outputs.updater_mac }}",
                "asar": {
                  "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz-mac.asar",
                  "sha256": "${{ steps.checksums.outputs.asar_mac }}"
                }
              }
            },
            "linux": {
              "debian": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.deb",
                "sha256": "${{ steps.checksums.outputs.deb }}",
                "electronVersion": "${{ steps.electron_version.outputs.version }}",
                "updaterVersion": "${{ steps.updater_version.outputs.version }}",
                "updaterSha256": "${{ steps.checksums.outputs.updater_linux }}",
                "asar": {
                  "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz-linux.asar",
                  "sha256": "${{ steps.checksums.outputs.asar_linux }}"
                }
              },
              "appimage": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.AppImage",
                "sha256": "${{ steps.checksums.outputs.appimage }}",
                "electronVersion": "${{ steps.electron_version.outputs.version }}",
                "updaterVersion": "${{ steps.updater_version.outputs.version }}",
                "updaterSha256": "${{ steps.checksums.outputs.updater_linux }}",
                "asar": {
                  "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz-linux.asar",
                  "sha256": "${{ steps.checksums.outputs.asar_linux }}"
                }
              },
              "rpm": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.rpm",
                "sha256": "${{ steps.checksums.outputs.rpm }}",
                "electronVersion": "${{ steps.electron_version.outputs.version }}",
                "updaterVersion": "${{ steps.updater_version.outputs.version }}",
                "updaterSha256": "${{ steps.checksums.outputs.updater_linux }}",
                "asar": {
                  "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz-linux.asar",
                  "sha256": "${{ steps.checksums.outputs.asar_linux }}"
                }
              },
              "pacman": {
                "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz.pacman",
                "sha256": "${{ steps.checksums.outputs.pacman }}",
                "electronVersion": "${{ steps.electron_version.outputs.version }}",
                "updaterVersion": "${{ steps.updater_version.outputs.version }}",
                "updaterSha256": "${{ steps.checksums.outputs.updater_linux }}",
                "asar": {
                  "url": "https://proxy.mutualzz.com/releases/latest/Mutualzz-linux.asar",
                  "sha256": "${{ steps.checksums.outputs.asar_linux }}"
                }
              }
            }
          }
          EOF
          echo "latest.json generated"

      - name: Upload to R2
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          upload() {
            local src="$1" dest="$2"
            if [[ -f "$src" ]]; then
              echo "Uploading $src -> $dest"
              wrangler r2 object put "$dest" --file "$src" --remote
            else
              echo "Skipping $dest (file not found)"
            fi
          }

          upload "release/MutualzzSetup.exe"  "mutualzz/releases/latest/MutualzzSetup.exe"
          upload "release/Mutualzz.dmg"       "mutualzz/releases/latest/Mutualzz.dmg"
          upload "release/Mutualzz.deb"       "mutualzz/releases/latest/Mutualzz.deb"
          upload "release/Mutualzz.AppImage"  "mutualzz/releases/latest/Mutualzz.AppImage"
          upload "release/Mutualzz.rpm"       "mutualzz/releases/latest/Mutualzz.rpm"
          upload "release/Mutualzz.pacman"    "mutualzz/releases/latest/Mutualzz.pacman"
          upload "release/Mutualzz-win.asar"  "mutualzz/releases/latest/Mutualzz-win.asar"
          upload "release/Mutualzz-mac.asar"  "mutualzz/releases/latest/Mutualzz-mac.asar"
          upload "release/Mutualzz-linux.asar" "mutualzz/releases/latest/Mutualzz-linux.asar"

          # latest.json goes up last -- only live once all binaries are in place
          upload "latest.json"                "mutualzz/releases/latest/latest.json"

  github-release:
    name: Create GitHub Release
    needs: publish-r2
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Init app submodule (for version)
        run: git submodule update --init ./apps/app

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release/
          merge-multiple: true

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/app/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          if [ -f CHANGELOG.md ]; then
            delim="CHANGELOG_$(date +%s)_$RANDOM"
            {
              echo "body<<$delim"
              head -c 65000 CHANGELOG.md
              echo
              echo "$delim"
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}
          name: Mutualzz Desktop v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            release/MutualzzSetup.exe
            release/Mutualzz.dmg
            release/Mutualzz.deb
            release/Mutualzz.AppImage
            release/Mutualzz.rpm
            release/Mutualzz.pacman
            release/Mutualzz-win.asar
            release/Mutualzz-mac.asar
            release/Mutualzz-linux.asar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
