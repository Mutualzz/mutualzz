name: Release Mobile

on:
  workflow_dispatch:
  push:
    branches:
      - release

concurrency:
  group: release-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mobile:
    name: Build Mobile (${{ matrix.target }})
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: android
          - platform: macos-latest
            target: ios

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Select Xcode version
        if: matrix.target == 'ios'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup iOS signing
        if: matrix.target == 'ios'
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_NOTIFICATION_SERVICE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_NOTIFICATION_SERVICE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          install_provisioning_profile() {
            local profile_b64="$1"
            local profile_file="$2"
            local profile_plist="$3"

            printf "%s" "$profile_b64" \
              | tr -d '\n\r' \
              | base64 --decode > "$profile_file"

            security cms -D -i "$profile_file" > "$profile_plist"

            local profile_uuid profile_name
            profile_uuid=$(plutil -extract UUID xml1 -o - "$profile_plist" \
              | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
            profile_name=$(plutil -extract Name xml1 -o - "$profile_plist" \
              | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')

            cp "$profile_file" \
              ~/Library/MobileDevice/"Provisioning Profiles"/"$profile_uuid.mobileprovision"

            echo "$profile_name"
          }

          echo "Decoding certificate (corruption-safe)..."
          printf "%s" "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" \
            | tr -d '\n\r' \
            | base64 --decode > /tmp/ios_distribution.p12

          echo "Validating certificate file..."
          ls -lh /tmp/ios_distribution.p12
          file /tmp/ios_distribution.p12

          echo "Creating keychain..."
          security create-keychain -p "build-keychain-password" ios-build.keychain
          security default-keychain -s ios-build.keychain
          security unlock-keychain -p "build-keychain-password" ios-build.keychain
          security set-keychain-settings -t 21600 ios-build.keychain

          echo "Importing certificate..."
          security import /tmp/ios_distribution.p12 \
            -k ios-build.keychain \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "build-keychain-password" \
            ios-build.keychain

          security list-keychains -d user -s ios-build.keychain $(security list-keychains -d user | tr -d '"')

          echo "Installing provisioning profiles..."
          mkdir -p ~/Library/MobileDevice/"Provisioning Profiles"

          echo "Installing main app provisioning profile..."
          PROFILE_NAME=$(install_provisioning_profile \
            "$IOS_PROVISIONING_PROFILE_BASE64" \
            /tmp/profile.mobileprovision \
            /tmp/profile.plist)

          echo "Installing notification service extension provisioning profile..."
          EXTENSION_PROFILE_NAME=$(install_provisioning_profile \
            "$IOS_NOTIFICATION_SERVICE_PROVISIONING_PROFILE_BASE64" \
            /tmp/extension_profile.mobileprovision \
            /tmp/extension_profile.plist)

          CODE_SIGN_IDENTITY=$(security find-identity -v -p codesigning ios-build.keychain \
            | grep -m1 "Apple Distribution" \
            | sed -E 's/.*"(.*)"/\1/')

          CODE_SIGN_SHA1=$(security find-identity -v -p codesigning ios-build.keychain \
            | grep -m1 "Apple Distribution" \
            | awk '{print $2}')

          EXTENSION_BUNDLE_ID=$(plutil -extract Entitlements.application-identifier raw -o - /tmp/extension_profile.plist \
            | sed 's/^[^.]*\.//')
          EXPECTED_EXTENSION_BUNDLE_ID="com.mutualzz.app.notification-service"
          if [[ "$EXTENSION_BUNDLE_ID" != "$EXPECTED_EXTENSION_BUNDLE_ID" ]]; then
            echo "::error::Extension provisioning profile App ID '$EXTENSION_BUNDLE_ID' does not match expected '$EXPECTED_EXTENSION_BUNDLE_ID'. Create an App Store distribution profile for the extension App ID and update IOS_NOTIFICATION_SERVICE_PROVISIONING_PROFILE_BASE64."
            exit 1
          fi

          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "EXTENSION_PROFILE_NAME=$EXTENSION_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "EXTENSION_BUNDLE_ID=$EXTENSION_BUNDLE_ID" >> "$GITHUB_ENV"
          echo "CODE_SIGN_IDENTITY=$CODE_SIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "CODE_SIGN_SHA1=$CODE_SIGN_SHA1" >> "$GITHUB_ENV"

      - name: Verify certificate is included in provisioning profiles
        if: matrix.target == 'ios'
        shell: bash
        run: |
          set -euo pipefail

          verify_certificate_in_profile() {
            local profile_plist="$1"
            local profile_name="$2"

            echo "Checking that '$CODE_SIGN_IDENTITY' is included in profile '$profile_name'..."
            local match="no"
            local i=0
            while :; do
              CERT_XML=$(plutil -extract "DeveloperCertificates.$i" xml1 -o - "$profile_plist" 2>/dev/null) || break
              [[ -z "$CERT_XML" ]] && break

              CERT_B64=$(echo "$CERT_XML" | sed -n '/<data>/,/<\/data>/p' | sed '1d;$d' | tr -d '\n\r\t ')
              echo "$CERT_B64" | base64 --decode > "/tmp/profile_cert_${profile_name// /_}_$i.der"

              FPR=$(openssl x509 -inform DER -in "/tmp/profile_cert_${profile_name// /_}_$i.der" -noout -fingerprint -sha1 \
                | sed 's/.*=//; s/://g')

              if [[ "$FPR" == "$CODE_SIGN_SHA1" ]]; then
                match="yes"
                break
              fi

              i=$((i + 1))
            done

            if [[ "$match" != "yes" ]]; then
              echo "::error::Certificate '$CODE_SIGN_IDENTITY' ($CODE_SIGN_SHA1) is not included in provisioning profile '$profile_name'. Regenerate the profile in the Apple Developer portal against this certificate and update the corresponding GitHub secret."
              exit 1
            fi

            echo "Certificate matches a certificate in provisioning profile '$profile_name'."
          }

          verify_certificate_in_profile /tmp/profile.plist "$PROFILE_NAME"
          verify_certificate_in_profile /tmp/extension_profile.plist "$EXTENSION_PROFILE_NAME"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Init only needed submodules
        shell: bash
        run: |
          git submodule update --init --jobs 8 \
            ./apps/mobile \
            ./packages/types \
            ./packages/logger \
            ./packages/ui-core \
            ./packages/ui-native \
            ./packages/validators \
            ./packages/bitfield \
            ./packages/i18n \
            ./tooling/eslint-config

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-mobile-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-mobile-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-mobile-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-mobile-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-mobile-

      - name: Cache Gradle
        if: matrix.target == 'android'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-mobile-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-mobile-

      - name: Cache CocoaPods
        if: matrix.target == 'ios'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/Library/Caches/org.cocoapods.cache
          key: ${{ runner.os }}-pods-mobile-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-pods-mobile-

      - name: Install dependencies
        run: pnpm i --filter @mutualzz/mobile...

      - name: Build workspace packages
        run: pnpm turbo run build --filter="./packages/types" --filter="./packages/logger" --filter="./packages/ui-core" --filter="./packages/ui-native" --filter="./packages/validators" --filter="./packages/bitfield" --filter="./packages/i18n"

      - name: Write .env.production
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_WS_URL: ${{ secrets.EXPO_PUBLIC_WS_URL }}
          EXPO_PUBLIC_CDN_URL: ${{ secrets.EXPO_PUBLIC_CDN_URL }}
          EXPO_SENTRY_DSN: ${{ secrets.EXPO_SENTRY_DSN }}
        run: |
          cat <<EOF > .env.production
          EXPO_PUBLIC_API_URL="$EXPO_PUBLIC_API_URL"
          EXPO_PUBLIC_WS_URL="$EXPO_PUBLIC_WS_URL"
          EXPO_PUBLIC_CDN_URL="$EXPO_PUBLIC_CDN_URL"

          EXPO_SENTRY_DSN="$EXPO_SENTRY_DSN"
          EOF

      - name: Setup Java
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      - name: Prebuild Android project
        if: matrix.target == 'android'
        working-directory: apps/mobile
        env:
          CI: "1"
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Decode Android keystore
        if: matrix.target == 'android'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/app/release.keystore
          if [[ ! -s apps/mobile/android/app/release.keystore ]]; then
            echo "::error::Decoded Android keystore is empty or invalid"
            exit 1
          fi

      - name: Patch Android release signing config
        if: matrix.target == 'android'
        shell: bash
        run: |
          cat <<'EOF' > /tmp/patch-android-signing.mjs
          import fs from "node:fs";

          const path = "apps/mobile/android/app/build.gradle";
          let gradle = fs.readFileSync(path, "utf8");

          if (!gradle.includes("signingConfigs.release")) {
            gradle = gradle.replace(
              /signingConfigs\s*\{([\s\S]*?debug\s*\{[\s\S]*?\}\s*)\}/,
              (match, debugBlock) => `signingConfigs {${debugBlock}
                  release {
                      storeFile file(System.getenv("ANDROID_RELEASE_STORE_FILE"))
                      storePassword System.getenv("ANDROID_RELEASE_STORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_RELEASE_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_RELEASE_KEY_PASSWORD")
                  }
              }`
            );
          }

          gradle = gradle.replace(
            /(buildTypes\s*\{[\s\S]*?\brelease\s*\{[\s\S]*?)signingConfig signingConfigs\.debug/,
            "$1signingConfig signingConfigs.release"
          );

          if (!/buildTypes\s*\{[\s\S]*?\brelease\s*\{[\s\S]*?signingConfig signingConfigs\.release/.test(gradle)) {
            console.error("Failed to patch release buildType signing config");
            process.exit(1);
          }

          fs.writeFileSync(path, gradle);
          console.log("Patched build.gradle with release signing config");
          EOF
          node /tmp/patch-android-signing.mjs
          sed -i "s/versionCode [0-9]\+/versionCode ${{ github.run_number }}/" apps/mobile/android/app/build.gradle

      - name: Build Android release (AAB + APK)
        if: matrix.target == 'android'
        working-directory: apps/mobile/android
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ github.workspace }}/apps/mobile/android/app/release.keystore
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GRADLE_OPTS: -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.daemon=false
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease assembleRelease --build-cache --no-daemon

      - name: Collect Android artifacts
        if: matrix.target == 'android'
        shell: bash
        run: |
          mkdir -p release
          AAB=$(ls apps/mobile/android/app/build/outputs/bundle/release/*.aab 2>/dev/null | head -n1)
          APK=$(ls apps/mobile/android/app/build/outputs/apk/release/*.apk 2>/dev/null | head -n1)
          [[ -f "$AAB" ]] && cp "$AAB" ./release/Mutualzz.aab
          [[ -f "$APK" ]] && cp "$APK" ./release/Mutualzz.apk

      - name: Prebuild iOS project
        if: matrix.target == 'ios'
        working-directory: apps/mobile
        env:
          CI: "1"
        run: |
          set -euo pipefail

          if [[ ! -f targets/notification-service/expo-target.config.js ]]; then
            echo "::error::Missing targets/notification-service/expo-target.config.js. The notification service extension must be present in apps/mobile before prebuild."
            exit 1
          fi

          pnpm exec expo prebuild --platform ios --no-install

      - name: Bump iOS build number
        if: matrix.target == 'ios'
        shell: bash
        run: |
          INFO_PLIST=$(find apps/mobile/ios -maxdepth 2 -name Info.plist ! -path "*Pods*" | head -n1)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$INFO_PLIST"

      - name: Verify capabilities match provisioning profile
        if: matrix.target == 'ios'
        shell: bash
        run: |
          set -euo pipefail

          ENTITLEMENTS_FILE=$(find apps/mobile/ios -maxdepth 2 -name "*.entitlements" | head -n1)
          if [[ -z "$ENTITLEMENTS_FILE" ]]; then
            echo "No entitlements file found, skipping capability check."
            exit 0
          fi

          echo "Checking capabilities requested in $ENTITLEMENTS_FILE against '$PROFILE_NAME'..."
          PROFILE_ENTITLEMENTS=$(plutil -extract Entitlements json -o - /tmp/profile.plist)
          echo "Provisioning profile entitlements: $PROFILE_ENTITLEMENTS"

          APP_KEYS=$(plutil -convert xml1 -o - "$ENTITLEMENTS_FILE" | grep -oE '<key>[^<]+</key>' | sed -E 's/<\/?key>//g')

          MISSING=""
          while IFS= read -r key; do
            [[ -z "$key" ]] && continue
            case "$key" in
              application-identifier | com.apple.developer.team-identifier | keychain-access-groups | get-task-allow | aps-environment)
                # aps-environment is added by Xcode during archive for App Store profiles.
                continue
                ;;
            esac
            if ! jq -e --arg k "$key" 'has($k)' <<<"$PROFILE_ENTITLEMENTS" >/dev/null; then
              MISSING="$MISSING $key"
            fi
          done <<<"$APP_KEYS"

          if [[ -n "$MISSING" ]]; then
            echo "::error::Provisioning profile '$PROFILE_NAME' is missing entitlement(s):$MISSING. Enable the matching capability on the com.mutualzz.app identifier in the Apple Developer portal, regenerate the profile, and update the IOS_PROVISIONING_PROFILE_BASE64 secret."
            exit 1
          fi
          echo "All requested capabilities are present in the provisioning profile."

      - name: Install CocoaPods dependencies
        if: matrix.target == 'ios'
        working-directory: apps/mobile/ios
        run: pod install

      - name: Resolve notification service extension target
        if: matrix.target == 'ios'
        shell: bash
        run: |
          set -euo pipefail

          XCODEPROJ=$(find apps/mobile/ios -name "*.xcodeproj" | head -n1)
          if [[ -z "$XCODEPROJ" ]]; then
            echo "::error::No .xcodeproj found after iOS prebuild."
            exit 1
          fi

          EXTENSION_TARGET=$(bash .github/scripts/resolve-ios-extension-target.sh \
            "$XCODEPROJ" \
            "$EXTENSION_BUNDLE_ID")

          echo "Resolved notification service extension target: $EXTENSION_TARGET"
          echo "EXTENSION_TARGET=$EXTENSION_TARGET" >> "$GITHUB_ENV"

      - name: Apply manual signing to generated Xcode project
        if: matrix.target == 'ios'
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          PBXPROJ=$(find apps/mobile/ios -name project.pbxproj | head -n1)
          if [[ -z "$PBXPROJ" ]]; then
            echo "::error::No project.pbxproj found after iOS prebuild."
            exit 1
          fi
          WORKSPACE=$(ls -d apps/mobile/ios/*.xcworkspace | head -n1)
          MAIN_TARGET=$(basename "$WORKSPACE" .xcworkspace)
          XCODEPROJ=$(find apps/mobile/ios -name "*.xcodeproj" | head -n1)
          if [[ -z "$XCODEPROJ" ]]; then
            echo "::error::No .xcodeproj found after iOS prebuild."
            exit 1
          fi
          ruby .github/scripts/patch-ios-signing.rb \
            "$XCODEPROJ" \
            "$APPLE_TEAM_ID" \
            "$PROFILE_NAME" \
            "$EXTENSION_PROFILE_NAME" \
            "$CODE_SIGN_IDENTITY" \
            "$MAIN_TARGET" \
            "$EXTENSION_TARGET"

      - name: Archive and export IPA
        if: matrix.target == 'ios'
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD }}
        run: |
          WORKSPACE=$(ls -d apps/mobile/ios/*.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          ARCHIVE_PATH="$RUNNER_TEMP/Mutualzz.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"
          METHOD="${IOS_EXPORT_METHOD:-app-store}"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive

          cat <<PLIST > "$RUNNER_TEMP/ExportOptions.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>$METHOD</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.mutualzz.app</key>
                  <string>$PROFILE_NAME</string>
                  <key>$EXTENSION_BUNDLE_ID</key>
                  <string>$EXTENSION_PROFILE_NAME</string>
              </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to App Store Connect (TestFlight)
        if: matrix.target == 'ios'
        shell: bash
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa 2>/dev/null | head -n1)

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Collect iOS artifacts
        if: matrix.target == 'ios'
        shell: bash
        run: |
          mkdir -p release
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa 2>/dev/null | head -n1)
          [[ -f "$IPA" ]] && cp "$IPA" ./release/Mutualzz.ipa

      - name: Cleanup iOS keychain
        if: matrix.target == 'ios' && always()
        run: security delete-keychain ios-build.keychain || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mobile-${{ matrix.target }}
          path: release/
          if-no-files-found: warn
          retention-days: 1

  github-release:
    name: Create GitHub Release
    needs: [build-mobile]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Init mobile submodule (for version)
        run: git submodule update --init ./apps/mobile

      - name: Download mobile artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-mobile-*
          path: release/
          merge-multiple: true

      - name: Read mobile version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/mobile/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          if [ -f CHANGELOG.md ]; then
            delim="CHANGELOG_$(date +%s)_$RANDOM"
            {
              echo "body<<$delim"
              head -c 65000 CHANGELOG.md
              echo
              echo "$delim"
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ steps.version.outputs.version }}
          name: Mutualzz Mobile v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            release/Mutualzz.apk
            release/Mutualzz.aab
            release/Mutualzz.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-google-play:
    name: Publish to Google Play
    needs: [build-mobile, github-release]
    runs-on: ubuntu-latest

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-mobile-android
          path: release/

      - name: Verify AAB
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f release/Mutualzz.aab ]]; then
            echo "::error::Mutualzz.aab not found — Android build must succeed before Play upload"
            ls -lah release/ || true
            exit 1
          fi
          ls -lah release/Mutualzz.aab

      - name: Upload AAB to Google Play (closed testing — Release)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.mutualzz.app
          releaseFiles: release/Mutualzz.aab
          track: Release
          status: completed
          changesNotSentForReview: true
