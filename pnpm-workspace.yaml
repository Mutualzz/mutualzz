packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  react: 19.2.3
  react-dom: 19.2.3
  react-native: 0.85.3
  "@shopify/react-native-skia": 2.6.2
  react-native-gesture-handler: ~2.31.1
  react-native-reanimated: 4.3.1
  react-native-safe-area-context: ~5.7.0
  react-native-svg: 15.15.4
  react-native-worklets: 0.8.3
  "@types/react": 19.2.17

overrides:
  react: 19.2.3
  react-dom: 19.2.3
  react-native: 0.85.3
  "@types/react": 19.2.17
  "@shopify/react-native-skia": 2.6.2
  react-native-gesture-handler: ~2.31.1
  react-native-reanimated: 4.3.1
  react-native-safe-area-context: ~5.7.0
  react-native-svg: 15.15.4
  react-native-worklets: 0.8.3
  yauzl: ^3.3.1

allowBuilds:
  "@discordjs/opus": true
  "@sentry-internal/node-cpu-profiler": true
  "@shopify/react-native-skia": true
  "@swc/core": true
  bcrypt: true
  bufferutil: true
  canvas: true
  electron: true
  esbuild: true
  keytar: true
  mediasoup: true
  sharp: true
  unrs-resolver: true
  zlib-sync: true

nodeLinker: hoisted
shamefullyHoist: true
blockExoticSubdeps: false

dedupeDirectDeps: true
dedupeInjectedDeps: true
dedupePeerDependents: true
dedupePeers: true
minimumReleaseAgeExclude:
  - html-react-parser@6.1.3
