packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  react: 19.2.3
  react-dom: 19.2.3
  react-native: 0.85.3
  "@shopify/react-native-skia": 2.6.2
  react-native-gesture-handler: ~2.31.1
  react-native-reanimated: 4.3.1
  react-native-safe-area-context: ~5.7.0
  react-native-svg: 15.15.4
  react-native-worklets: 0.8.3
  "@types/react": 19.2.17

overrides:
  react: 19.2.3
  react-dom: 19.2.3
  react-native: 0.85.3
  "@types/react": 19.2.17
  "@shopify/react-native-skia": 2.6.2
  react-native-gesture-handler: ~2.31.1
  react-native-reanimated: 4.3.1
  react-native-safe-area-context: ~5.7.0
  react-native-svg: 15.15.4
  react-native-worklets: 0.8.3
  yauzl: ^3.3.1

allowBuilds:
  "@discordjs/opus": true
  "@sentry-internal/node-cpu-profiler": true
  "@sentry/node-cpu-profiler": true
  "@shopify/react-native-skia": true
  "@swc/core": true
  bcrypt: true
  bufferutil: true
  canvas: true
  electron: true
  esbuild: true
  keytar: true
  mediasoup: true
  "@roamhq/wrtc": true
  sharp: true
  unrs-resolver: true
  zlib-sync: true
  core-js: set this to true or false

nodeLinker: hoisted
shamefullyHoist: true
blockExoticSubdeps: false

dedupeDirectDeps: true
dedupeInjectedDeps: true
dedupePeerDependents: true
dedupePeers: true
minimumReleaseAgeExclude:
  - html-react-parser@6.1.3
  - '@expo/cli@56.1.19'
  - '@expo/config-plugins@56.0.12'
  - '@expo/fingerprint@0.19.7'
  - '@expo/prebuild-config@56.0.19'
  - '@expo/router-server@56.0.16'
  - babel-preset-expo@56.0.17
  - expo-asset@56.0.19
  - expo-modules-autolinking@56.0.19
  - expo-modules-core@56.0.20
  - expo-modules-jsi@56.0.12
  - expo@56.0.15
  - '@expo/ui@56.0.21'
  - expo-image-picker@56.0.20
  - expo-notifications@56.0.20
  - expo-router@56.2.14
